<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — IRL Estudios</title>
<meta name="robots" content="noindex, nofollow">
<style>
  :root{
    --ink:#232323;
    --paper:#eaeaea;
    --line-light:rgba(0,0,0,0.15);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:#111;
    color:var(--ink);
    font-family:ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, monospace;
    min-height:100vh;
  }
  .center-wrap{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .box{
    background:var(--paper);
    border:1.6px solid var(--line-light);
    border-radius:12.8px;
    padding:28px;
    width:100%;
    max-width:340px;
  }
  .box h1{font-size:18px; margin:0 0 16px;}
  input[type=password]{
    width:100%;
    font-family:inherit;
    font-size:14px;
    padding:10px 12px;
    border:1.6px solid var(--line-light);
    border-radius:8px;
    background:#fff;
    color:var(--ink);
    margin-bottom:10px;
  }
  button{
    font-family:inherit;
    font-size:13px;
    font-weight:700;
    background:var(--ink);
    color:var(--paper);
    border:none;
    border-radius:8px;
    padding:10px 18px;
    cursor:pointer;
  }
  button.secondary{
    background:transparent;
    color:var(--ink);
    border:1.6px solid rgba(0,0,0,0.6);
  }
  button:disabled{opacity:0.5; cursor:default;}
  .error{color:#b3261e; font-size:13px; margin-bottom:10px; display:none;}
  .app{display:none; height:100vh; flex-direction:column;}
  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 24px;
    background:var(--paper);
    border-bottom:1px solid var(--line-light);
  }
  .layout{display:flex; flex:1; min-height:0;}
  .sidebar{
    width:240px;
    flex-shrink:0;
    background:var(--paper);
    border-right:1px solid var(--line-light);
    padding:16px;
    overflow-y:auto;
  }
  .sidebar button{
    display:block;
    width:100%;
    text-align:left;
    background:transparent;
    color:var(--ink);
    font-weight:400;
    border:none;
    border-radius:6px;
    padding:10px 12px;
    margin-bottom:4px;
  }
  .sidebar button:hover, .sidebar button.active{background:rgba(0,0,0,0.08);}
  .content{flex:1; display:flex; flex-direction:column; min-width:0; background:#000;}
  .hint-bar{
    padding:10px 20px;
    font-size:11.5px;
    line-height:1.4;
    color:rgba(0,0,0,0.6);
    background:var(--paper);
    border-bottom:1px solid var(--line-light);
  }
  .placeholder{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    color:rgba(255,255,255,0.4);
    font-size:14px;
    background:#000;
  }
  .preview-wrap{flex:1; position:relative; min-height:0;}
  .preview-wrap iframe{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    border:none;
    background:#000;
  }
  .save-bar{
    background:var(--paper);
    border-top:1px solid var(--line-light);
    padding:14px 24px;
    display:flex;
    align-items:center;
    gap:12px;
  }
  .status{font-size:13px; color:rgba(0,0,0,0.6);}
</style>
</head>
<body>

<div class="center-wrap" id="loginScreen">
  <div class="box">
    <h1>Entrar al panel</h1>
    <div class="error" id="loginError">Contraseña incorrecta.</div>
    <input type="password" id="passwordInput" placeholder="Contraseña" autofocus>
    <button id="loginButton" style="width:100%;">Entrar</button>
  </div>
</div>

<div class="app" id="app">
  <div class="topbar">
    <strong>IRL Estudios — Admin</strong>
    <button class="secondary" id="logoutButton">Cerrar sesión</button>
  </div>
  <div class="layout">
    <div class="sidebar" id="pageList"></div>
    <div class="content">
      <div class="hint-bar">Vista previa en vivo: haz clic directamente sobre cualquier texto para editarlo, o sobre una imagen para cambiarla. Así se verá en la web real.</div>
      <div class="placeholder" id="placeholder">Elige una página de la izquierda para empezar a editar.</div>
      <div class="preview-wrap" id="previewWrap" style="display:none;">
        <iframe id="previewFrame"></iframe>
      </div>
      <div class="save-bar" id="saveBar" style="display:none;">
        <button id="saveButton">Guardar cambios</button>
        <button class="secondary" id="discardButton">Descartar cambios</button>
        <span class="status" id="saveStatus"></span>
      </div>
    </div>
  </div>
</div>

<script>
var PAGES = [
  { slug: 'home', label: 'Home' },
  { slug: 'produccion-musical-avanzada', label: 'Producción Musical Avanzada' },
  { slug: 'produccion-musical-iniciacion', label: 'Producción Musical Iniciación' },
  { slug: 'diseno-sonoro-audiovisual', label: 'Diseño Sonoro para audiovisual' },
  { slug: 'directo-en-ableton', label: 'Directo en Ableton' },
  { slug: 'opiniones', label: 'Opiniones de alumn@s' },
  { slug: 'turian-boy', label: 'turian boy' },
  { slug: 'estudio-a', label: 'Estudio A' }
];

var currentSlug = null;
var currentDoc = null;
var originalSnapshot = null;
var activePopover = null;
var activeFormatToolbar = null;

function htmlFileFor(slug) {
  return slug === 'home' ? 'index.html' : slug + '.html';
}

function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  renderPageList();
}

function showLogin() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

function renderPageList() {
  var list = document.getElementById('pageList');
  list.innerHTML = '';
  PAGES.forEach(function (p) {
    var btn = document.createElement('button');
    btn.textContent = p.label;
    btn.onclick = function () { requestLoadPage(p.slug, btn); };
    list.appendChild(btn);
  });
}

function hasUnsavedChanges() {
  if (!currentDoc || !originalSnapshot) return false;
  return JSON.stringify(collectData(currentDoc)) !== originalSnapshot;
}

function requestLoadPage(slug, btnEl) {
  if (hasUnsavedChanges() && !confirm('Tienes cambios sin guardar en esta página. ¿Seguro que quieres salir sin guardarlos?')) {
    return;
  }
  loadPage(slug, btnEl);
}

function loadPage(slug, btnEl) {
  currentSlug = slug;
  currentDoc = null;
  originalSnapshot = null;
  closePopover();

  document.querySelectorAll('.sidebar button').forEach(function (b) { b.classList.remove('active'); });
  if (btnEl) btnEl.classList.add('active');
  else {
    var idx = PAGES.findIndex(function (p) { return p.slug === slug; });
    var btns = document.querySelectorAll('.sidebar button');
    if (btns[idx]) btns[idx].classList.add('active');
  }

  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('previewWrap').style.display = 'block';
  document.getElementById('saveBar').style.display = 'flex';
  document.getElementById('saveButton').disabled = true;
  document.getElementById('saveStatus').textContent = 'Cargando vista previa...';

  var iframe = document.getElementById('previewFrame');
  iframe.onload = function () { onPreviewLoaded(iframe, slug); };
  iframe.src = '/' + htmlFileFor(slug) + '?admin=1&_=' + Date.now();
}

function onPreviewLoaded(iframe, slug) {
  if (slug !== currentSlug) return; // el usuario ya cambió de página
  var doc = iframe.contentDocument;

  function ready() {
    if (slug !== currentSlug) return;
    currentDoc = doc;
    enableLiveEditing(doc);
    originalSnapshot = JSON.stringify(collectData(doc));
    document.getElementById('saveButton').disabled = false;
    document.getElementById('saveStatus').textContent = '';
  }

  if (doc.__irlContentReady) {
    ready();
  } else {
    doc.addEventListener('irl:content-ready', ready, { once: true });
    // Salvavidas por si la página no tiene data-page o el evento no llega.
    setTimeout(function () { if (!currentDoc) ready(); }, 2500);
  }
}

// ---------- Edición en vivo dentro del iframe ----------

function injectEditingStyles(doc) {
  if (doc.getElementById('irl-admin-style')) return;
  var style = doc.createElement('style');
  style.id = 'irl-admin-style';
  style.textContent = [
    '[contenteditable="true"].irl-editable{outline:2px dashed transparent; outline-offset:2px; cursor:text; border-radius:3px; transition:outline-color .12s ease, background-color .12s ease;}',
    '[contenteditable="true"].irl-editable:hover{outline-color:rgba(200,255,61,0.75);}',
    '[contenteditable="true"].irl-editable:focus{outline-color:#c8ff3d; outline-style:solid; background-color:rgba(200,255,61,0.12);}',
    '.irl-img-wrap{position:relative !important; cursor:pointer;}',
    '.irl-img-overlay{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.55); color:#fff; font-family:ui-monospace,monospace; font-size:12px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; text-align:center; opacity:0; transition:opacity .15s ease; pointer-events:none; padding:8px;}',
    '.irl-img-wrap:hover .irl-img-overlay{opacity:1;}',
    '.irl-href-badge{position:absolute; top:-9px; right:-9px; z-index:99999; background:#232323; color:#eaeaea; border-radius:50%; width:22px; height:22px; display:flex; align-items:center; justify-content:center; font-size:11px; line-height:1; cursor:pointer; box-shadow:0 2px 6px rgba(0,0,0,0.35);}',
    '.irl-href-popover{position:fixed; z-index:100000; background:#eaeaea; border:1.6px solid rgba(0,0,0,0.2); border-radius:8px; padding:12px; box-shadow:0 8px 24px rgba(0,0,0,0.35); font-family:ui-monospace,monospace; color:#232323;}',
    '.irl-href-popover .irl-label{font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:0.03em; margin-bottom:6px; opacity:0.65;}',
    '.irl-href-popover input{width:260px; max-width:60vw; font-family:inherit; font-size:12px; padding:7px 9px; border:1.6px solid rgba(0,0,0,0.2); border-radius:6px; margin-bottom:8px; display:block;}',
    '.irl-href-popover .irl-row{display:flex; gap:6px;}',
    '.irl-href-popover button{font-family:inherit; font-size:11px; font-weight:700; padding:7px 12px; border-radius:6px; border:none; background:#232323; color:#eaeaea; cursor:pointer;}',
    '.irl-href-popover button.irl-cancel{background:transparent; border:1.6px solid rgba(0,0,0,0.4); color:#232323;}',
    '.irl-hidden-ghost{opacity:0.3; outline:2px dashed rgba(255,60,60,0.8) !important; outline-offset:2px;}',
    '.irl-visibility-badge{position:absolute; top:-9px; left:-9px; z-index:99999; background:#232323; color:#eaeaea; border-radius:50%; width:22px; height:22px; display:flex; align-items:center; justify-content:center; font-size:11px; line-height:1; cursor:pointer; box-shadow:0 2px 6px rgba(0,0,0,0.35);}',
    '.irl-visibility-label{position:absolute; top:-9px; left:16px; z-index:99999; background:#b3261e; color:#fff; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.03em; padding:3px 8px; border-radius:5px; white-space:nowrap; pointer-events:none;}',
    '.irl-format-toolbar{position:fixed; z-index:100000; background:#232323; border-radius:8px; padding:6px; box-shadow:0 8px 24px rgba(0,0,0,0.4); font-family:ui-monospace,monospace; display:flex; align-items:center; gap:4px;}',
    '.irl-format-toolbar button{font-family:inherit; font-size:13px; font-weight:700; padding:6px 10px; border-radius:5px; border:none; background:transparent; color:#eaeaea; cursor:pointer; line-height:1;}',
    '.irl-format-toolbar button:hover{background:rgba(255,255,255,0.15);}',
    '.irl-format-toolbar button.irl-active{background:#c8ff3d; color:#232323;}',
    '.irl-format-toolbar select{font-family:inherit; font-size:11px; padding:6px 4px; border-radius:5px; border:none; background:rgba(255,255,255,0.12); color:#eaeaea; cursor:pointer;}',
    '.irl-format-toolbar .irl-sep{width:1px; height:20px; background:rgba(255,255,255,0.2); margin:0 2px;}',
    // Pausa cualquier animación CSS (p. ej. el logo flotante) mientras se
    // edita: si no, sus controles se mueven todo el rato y es casi
    // imposible hacer clic en ellos con precisión.
    '*{animation-play-state:paused !important;}',
    '.irl-bg-pill{position:absolute; z-index:5; bottom:16px; left:16px; display:flex; align-items:center; gap:6px; background:rgba(0,0,0,0.7); color:#fff; font-family:ui-monospace,monospace; font-size:12px; font-weight:700; letter-spacing:0.02em; padding:9px 14px; border-radius:9999px; cursor:pointer; box-shadow:0 4px 14px rgba(0,0,0,0.4); border:1.6px solid rgba(255,255,255,0.25);}',
    '.irl-bg-pill:hover{background:rgba(0,0,0,0.88);}',
    '.irl-drag-handle{position:absolute; bottom:-10px; right:-10px; z-index:99999; width:22px; height:22px; border-radius:50%; background:#232323; color:#eaeaea; display:flex; align-items:center; justify-content:center; font-size:12px; cursor:nwse-resize; box-shadow:0 2px 6px rgba(0,0,0,0.35);}',
    '.irl-move-hint{position:absolute; top:-9px; right:14px; z-index:99999; background:#232323; color:#eaeaea; font-size:9.5px; font-weight:700; text-transform:uppercase; letter-spacing:0.03em; padding:3px 7px; border-radius:5px; white-space:nowrap; pointer-events:none; opacity:0; transition:opacity .15s ease;}',
    '.irl-positionable:hover .irl-move-hint{opacity:1;}',
    '.irl-positionable{cursor:move; -webkit-user-drag:none; user-select:none;}',
    '.irl-positionable img{-webkit-user-drag:none; user-select:none; pointer-events:none;}'
  ].join('\n');
  doc.head.appendChild(style);
}

function sanitizePlainText(el) {
  // Limpia cualquier formato colado al editar, preservando el badge
  // de "editar enlace" si el elemento también tiene data-key-href.
  var badge = el.querySelector(':scope > .irl-href-badge');
  var text = badge ? textWithoutBadge(el) : el.textContent;
  el.textContent = text;
  if (badge) el.appendChild(badge);
}

// Para imágenes con position:absolute/fixed (fondos a pantalla completa),
// envolverlas en un div rompería su posicionamiento (el div nuevo pasaría
// a ser el "contenedor" del inset:0 y se colapsaría a 0 de alto). En vez
// de envolver, se añade el overlay como hermano, ocupando exactamente el
// mismo hueco (misma clase .hero-bg / mismo contexto de posicionamiento).
function isOutOfFlowPositioned(doc, el) {
  var pos = doc.defaultView.getComputedStyle(el).position;
  return pos === 'absolute' || pos === 'fixed';
}

function attachOverlayAsSibling(doc, img) {
  // Para fondos a pantalla completa, un overlay que solo aparece al pasar
  // el ratón por encima es fácil de no encontrar (sobre todo si el panel
  // de navegación tapa buena parte de la imagen). En su lugar se coloca
  // un botón pequeño y SIEMPRE VISIBLE en una esquina fija.
  var existing = img.nextElementSibling;
  if (existing && existing.classList.contains('irl-bg-pill')) return existing;
  var pill = doc.createElement('div');
  pill.className = 'irl-bg-pill';
  pill.textContent = '🖼️ Cambiar imagen de fondo';
  // Se ancla dentro del mismo contenedor de posicionamiento que la
  // imagen (position:absolute), pero sin estirarse a rellenarlo entero.
  var cs = doc.defaultView.getComputedStyle(img);
  pill.style.position = cs.position;
  img.parentElement.insertBefore(pill, img.nextSibling);
  return pill;
}

function wrapImageForEdit(doc, img) {
  if (isOutOfFlowPositioned(doc, img)) return attachOverlayAsSibling(doc, img);

  var parent = img.parentElement;
  if (parent && parent.classList.contains('irl-img-wrap')) return parent;
  var wrap = doc.createElement('div');
  wrap.className = 'irl-img-wrap';
  parent.insertBefore(wrap, img);
  wrap.appendChild(img);
  var overlay = doc.createElement('div');
  overlay.className = 'irl-img-overlay';
  overlay.textContent = 'Cambiar imagen';
  wrap.appendChild(overlay);
  return wrap;
}

function closePopover() {
  if (activePopover && activePopover.parentNode) activePopover.parentNode.removeChild(activePopover);
  activePopover = null;
}

function openHrefPopover(doc, el, badge) {
  closePopover();
  var rect = badge.getBoundingClientRect();
  var pop = doc.createElement('div');
  pop.className = 'irl-href-popover';

  var label = doc.createElement('div');
  label.className = 'irl-label';
  label.textContent = 'Editar enlace';
  pop.appendChild(label);

  var input = doc.createElement('input');
  input.type = 'text';
  input.value = el.getAttribute('href') || '';
  pop.appendChild(input);

  var row = doc.createElement('div');
  row.className = 'irl-row';
  var okBtn = doc.createElement('button');
  okBtn.textContent = 'Guardar enlace';
  var cancelBtn = doc.createElement('button');
  cancelBtn.textContent = 'Cancelar';
  cancelBtn.className = 'irl-cancel';
  row.appendChild(okBtn);
  row.appendChild(cancelBtn);
  pop.appendChild(row);

  doc.body.appendChild(pop);

  var top = rect.bottom + 6;
  var left = rect.right - pop.offsetWidth;
  if (left < 6) left = 6;
  pop.style.top = top + 'px';
  pop.style.left = left + 'px';

  input.focus();
  input.select();

  okBtn.onclick = function () {
    el.setAttribute('href', input.value.trim());
    closePopover();
  };
  cancelBtn.onclick = closePopover;
  input.onkeydown = function (e) {
    if (e.key === 'Enter') { e.preventDefault(); okBtn.click(); }
    if (e.key === 'Escape') { e.preventDefault(); closePopover(); }
  };

  activePopover = pop;
}

function closeFormatToolbar() {
  if (activeFormatToolbar && activeFormatToolbar.parentNode) activeFormatToolbar.parentNode.removeChild(activeFormatToolbar);
  activeFormatToolbar = null;
}

// Aplica un tamaño de letra a la selección guardada envolviéndola en un
// <span style="font-size:...">. Se usa un Range guardado (no la selección
// "en vivo") porque el <select> nativo roba el foco del texto editable
// al abrirse, y para entonces la selección original ya se habría perdido.
function applyFontSize(doc, savedRange, px) {
  if (!savedRange) return;
  var span = doc.createElement('span');
  span.style.fontSize = px + 'px';
  try {
    savedRange.surroundContents(span);
  } catch (e) {
    var frag = savedRange.extractContents();
    span.appendChild(frag);
    savedRange.insertNode(span);
  }
}

function showFormatToolbar(doc, range) {
  closeFormatToolbar();
  var rect = range.getBoundingClientRect();
  if (!rect || (rect.width === 0 && rect.height === 0)) return;
  var savedRange = range.cloneRange();

  var bar = doc.createElement('div');
  bar.className = 'irl-format-toolbar';

  function addButton(label, title, active, onClick) {
    var btn = doc.createElement('button');
    btn.textContent = label;
    btn.title = title;
    if (active) btn.classList.add('irl-active');
    btn.addEventListener('mousedown', function (e) { e.preventDefault(); });
    btn.addEventListener('click', function (e) {
      e.preventDefault();
      e.stopPropagation();
      onClick();
      var sel = doc.getSelection();
      if (sel && sel.rangeCount && !sel.isCollapsed) showFormatToolbar(doc, sel.getRangeAt(0));
    });
    bar.appendChild(btn);
    return btn;
  }

  addButton('B', 'Negrita', doc.queryCommandState('bold'), function () { doc.execCommand('bold'); });
  var iBtn = addButton('I', 'Cursiva', doc.queryCommandState('italic'), function () { doc.execCommand('italic'); });
  iBtn.style.fontStyle = 'italic';

  var sep1 = doc.createElement('div');
  sep1.className = 'irl-sep';
  bar.appendChild(sep1);

  addButton('Normal', 'Quitar negrita, cursiva y tamaño', false, function () {
    doc.execCommand('removeFormat');
  });

  var sep2 = doc.createElement('div');
  sep2.className = 'irl-sep';
  bar.appendChild(sep2);

  var select = doc.createElement('select');
  [
    { label: 'Tamaño', value: '' },
    { label: 'Pequeño', value: '12' },
    { label: 'Normal', value: '14' },
    { label: 'Grande', value: '18' },
    { label: 'Muy grande', value: '24' }
  ].forEach(function (opt) {
    var o = doc.createElement('option');
    o.value = opt.value;
    o.textContent = opt.label;
    select.appendChild(o);
  });
  select.addEventListener('mousedown', function (e) { e.stopPropagation(); });
  select.addEventListener('change', function () {
    if (select.value) applyFontSize(doc, savedRange, select.value);
    closeFormatToolbar();
  });
  bar.appendChild(select);

  doc.body.appendChild(bar);

  var top = rect.top - bar.offsetHeight - 8;
  if (top < 4) top = rect.bottom + 8;
  var left = rect.left + (rect.width / 2) - (bar.offsetWidth / 2);
  if (left < 4) left = 4;
  bar.style.top = top + 'px';
  bar.style.left = left + 'px';

  activeFormatToolbar = bar;
}

function onSelectionChange(doc) {
  // No cerrar la barra mientras el foco esté dentro de ella (p. ej. el
  // desplegable de tamaño, que roba el foco del texto al abrirse).
  if (activeFormatToolbar && activeFormatToolbar.contains(doc.activeElement)) return;

  var sel = doc.getSelection();
  if (!sel || sel.rangeCount === 0 || sel.isCollapsed) { closeFormatToolbar(); return; }

  var range = sel.getRangeAt(0);
  var node = range.commonAncestorContainer;
  var el = node.nodeType === 3 ? node.parentElement : node;
  if (!el || !el.closest || !el.closest('.irl-editable-html')) { closeFormatToolbar(); return; }

  showFormatToolbar(doc, range);
}

// Arrastrar para reposicionar un elemento (p. ej. el logo) dentro de su
// contenedor. La posición se guarda en left/top en % (mismas unidades
// que ya usaba la hoja de estilos), así se mantiene fluido si cambia
// el tamaño de ventana.
// El logo entero (incluida la imagen) tiene que poder arrastrarse, pero
// la imagen TAMBIÉN abre el selector de archivo al hacer clic. Para que
// ambas cosas convivan: si el ratón se mueve más de unos pocos píxeles
// entre el mousedown y el mouseup, se trata como arrastre (y se marca
// el elemento con __irlJustDragged para que el clic de "cambiar imagen"
// que llega justo después se ignore); si no se movió, es un clic normal.
var DRAG_THRESHOLD_PX = 4;

function makePositionable(doc, el) {
  el.classList.add('irl-positionable');
  var hint = doc.createElement('span');
  hint.className = 'irl-move-hint';
  hint.setAttribute('contenteditable', 'false');
  hint.textContent = 'Arrastrar para mover';
  el.appendChild(hint);

  var tracking = false, moved = false;
  var startX = 0, startY = 0, startLeftPct = 0, startTopPct = 0, parentRect = null;

  el.addEventListener('mousedown', function (e) {
    if (e.target.closest('.irl-bg-pill, .irl-visibility-badge, .irl-drag-handle')) return;
    tracking = true;
    moved = false;
    startX = e.clientX;
    startY = e.clientY;
    parentRect = el.offsetParent.getBoundingClientRect();
    var rect = el.getBoundingClientRect();
    startLeftPct = ((rect.left - parentRect.left) / parentRect.width) * 100;
    startTopPct = ((rect.top - parentRect.top) / parentRect.height) * 100;
  });

  doc.addEventListener('mousemove', function (e) {
    if (!tracking) return;
    var dx = e.clientX - startX;
    var dy = e.clientY - startY;
    if (!moved && Math.hypot(dx, dy) < DRAG_THRESHOLD_PX) return;
    if (!moved) { moved = true; e.preventDefault(); }
    var dxPct = (dx / parentRect.width) * 100;
    var dyPct = (dy / parentRect.height) * 100;
    el.style.left = (startLeftPct + dxPct).toFixed(2) + '%';
    el.style.top = (startTopPct + dyPct).toFixed(2) + '%';
  });

  doc.addEventListener('mouseup', function () {
    if (!tracking) return;
    tracking = false;
    if (moved) {
      el.__irlJustDragged = true;
      setTimeout(function () { el.__irlJustDragged = false; }, 0);
    }
  });
}

// Manija en la esquina para cambiar el tamaño (ancho) de un elemento.
function makeResizable(doc, el) {
  var handle = doc.createElement('span');
  handle.className = 'irl-drag-handle';
  handle.setAttribute('contenteditable', 'false');
  handle.textContent = '⤡';
  handle.title = 'Arrastrar para cambiar el tamaño';
  el.appendChild(handle);

  var resizing = false;
  var startX = 0, startWidth = 0;

  handle.addEventListener('mousedown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    resizing = true;
    startX = e.clientX;
    startWidth = el.getBoundingClientRect().width;
  });

  doc.addEventListener('mousemove', function (e) {
    if (!resizing) return;
    var newWidth = Math.max(40, startWidth + (e.clientX - startX));
    el.style.width = newWidth + 'px';
  });

  doc.addEventListener('mouseup', function () { resizing = false; });
}

function enableLiveEditing(doc) {
  injectEditingStyles(doc);

  // Nunca navegar fuera de la página mientras editamos.
  doc.addEventListener('click', function (e) {
    var a = e.target.closest('a');
    if (a) e.preventDefault();
    if (activePopover && !activePopover.contains(e.target) && !e.target.classList.contains('irl-href-badge')) {
      closePopover();
    }
  }, true);

  // Textos simples (una línea, sin formato).
  doc.querySelectorAll('[data-key]').forEach(function (el) {
    el.setAttribute('contenteditable', 'true');
    el.classList.add('irl-editable');
    el.addEventListener('blur', function () { sanitizePlainText(el); });
    el.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
    });
    el.addEventListener('paste', function (e) {
      e.preventDefault();
      var text = (e.clipboardData || doc.defaultView.clipboardData).getData('text/plain');
      doc.execCommand('insertText', false, text);
    });
  });

  // Bloques con formato (negritas, listas de líneas...).
  doc.querySelectorAll('[data-key-html]').forEach(function (el) {
    el.setAttribute('contenteditable', 'true');
    el.classList.add('irl-editable', 'irl-editable-html');
    el.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        doc.execCommand('insertHTML', false, '<br>');
      }
    });
  });
  doc.addEventListener('selectionchange', function () { onSelectionChange(doc); });

  // Imágenes: clic para subir una nueva.
  doc.querySelectorAll('[data-key-src]').forEach(function (img) {
    var wrap = wrapImageForEdit(doc, img);
    wrap.addEventListener('click', function (e) {
      e.preventDefault();
      e.stopPropagation();
      var positionableAncestor = img.closest('.irl-positionable');
      if (positionableAncestor && positionableAncestor.__irlJustDragged) return;
      var key = img.getAttribute('data-key-src');
      var input = doc.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.style.display = 'none';
      doc.body.appendChild(input);
      input.onchange = function () {
        if (!input.files[0]) { input.remove(); return; }
        var status = document.getElementById('saveStatus');
        status.textContent = 'Subiendo imagen (' + key + ')...';
        uploadImage(input.files[0], function (url) {
          img.src = url;
          status.textContent = 'Imagen actualizada. Recuerda guardar los cambios.';
          input.remove();
        }, function (message) {
          status.textContent = message || 'Error subiendo la imagen.';
          input.remove();
        });
      };
      input.click();
    });
  });

  // Elementos que se pueden mostrar/ocultar (p. ej. el logo animado).
  doc.querySelectorAll('[data-key-visible]').forEach(function (el) {
    var computedPos = doc.defaultView.getComputedStyle(el).position;
    if (computedPos === 'static') el.style.position = 'relative';

    // El estado real (lo que se guarda) se lleva en dataset.irlHidden;
    // en el editor se fuerza a visible con una "sombra" para poder
    // seguir viendo el elemento y volver a activarlo con el badge.
    el.dataset.irlHidden = (el.style.display === 'none') ? 'true' : 'false';
    el.style.display = '';

    var badge = doc.createElement('span');
    badge.className = 'irl-visibility-badge';
    badge.setAttribute('contenteditable', 'false');
    el.appendChild(badge);

    var label = doc.createElement('span');
    label.className = 'irl-visibility-label';
    label.textContent = 'Oculto en la web';
    el.appendChild(label);

    function refresh() {
      var hidden = el.dataset.irlHidden === 'true';
      el.classList.toggle('irl-hidden-ghost', hidden);
      label.style.display = hidden ? 'block' : 'none';
      badge.textContent = hidden ? '🙈' : '👁';
      badge.title = hidden ? 'Mostrar en la web' : 'Ocultar en la web';
    }
    refresh();

    badge.addEventListener('mousedown', function (e) { e.preventDefault(); });
    badge.addEventListener('click', function (e) {
      e.preventDefault();
      e.stopPropagation();
      el.dataset.irlHidden = (el.dataset.irlHidden === 'true') ? 'false' : 'true';
      refresh();
    });
  });

  // Elementos que se pueden arrastrar para reposicionar.
  doc.querySelectorAll('[data-key-left]').forEach(function (el) {
    makePositionable(doc, el);
  });

  // Elementos que se pueden redimensionar con una manija en la esquina.
  doc.querySelectorAll('[data-key-width]').forEach(function (el) {
    makeResizable(doc, el);
  });

  // Enlaces: badge para editar el href sin salir de la vista previa.
  doc.querySelectorAll('[data-key-href]').forEach(function (el) {
    var computedPos = doc.defaultView.getComputedStyle(el).position;
    if (computedPos === 'static') el.style.position = 'relative';
    var badge = doc.createElement('span');
    badge.className = 'irl-href-badge';
    badge.setAttribute('contenteditable', 'false');
    badge.textContent = '🔗';
    badge.title = 'Editar enlace';
    el.appendChild(badge);
    badge.addEventListener('mousedown', function (e) { e.preventDefault(); });
    badge.addEventListener('click', function (e) {
      e.preventDefault();
      e.stopPropagation();
      openHrefPopover(doc, el, badge);
    });
  });
}

// Lee el estado actual de la vista previa (lo que se ve = lo que se guarda).
function textWithoutBadge(el) {
  var clone = el.cloneNode(true);
  clone.querySelectorAll('.irl-href-badge').forEach(function (b) { b.remove(); });
  return clone.textContent.trim();
}

function collectData(doc) {
  var data = {};
  doc.querySelectorAll('[data-key]').forEach(function (el) {
    data[el.getAttribute('data-key')] = textWithoutBadge(el);
  });
  doc.querySelectorAll('[data-key-html]').forEach(function (el) {
    var clone = el.cloneNode(true);
    clone.querySelectorAll('.irl-href-badge').forEach(function (b) { b.remove(); });
    data[el.getAttribute('data-key-html')] = clone.innerHTML.trim();
  });
  doc.querySelectorAll('[data-key-src]').forEach(function (el) {
    data[el.getAttribute('data-key-src')] = el.getAttribute('src');
  });
  doc.querySelectorAll('[data-key-href]').forEach(function (el) {
    data[el.getAttribute('data-key-href')] = el.getAttribute('href');
  });
  doc.querySelectorAll('[data-key-visible]').forEach(function (el) {
    data[el.getAttribute('data-key-visible')] = el.dataset.irlHidden !== 'true';
  });
  doc.querySelectorAll('[data-key-left]').forEach(function (el) {
    data[el.getAttribute('data-key-left')] = el.style.left;
  });
  doc.querySelectorAll('[data-key-top]').forEach(function (el) {
    data[el.getAttribute('data-key-top')] = el.style.top;
  });
  doc.querySelectorAll('[data-key-width]').forEach(function (el) {
    data[el.getAttribute('data-key-width')] = el.style.width;
  });
  return data;
}

function uploadImage(file, onDone, onError) {
  fetch('/api/upload-image', {
    method: 'POST',
    headers: {
      'Content-Type': file.type,
      'X-Filename': file.name
    },
    body: file
  })
    .then(function (r) { return r.json().then(function (data) { return { ok: r.ok, data: data }; }); })
    .then(function (result) {
      if (result.ok) {
        onDone(result.data.url);
      } else if (onError) {
        var msg = result.data.error || 'Error subiendo la imagen.';
        if (result.data.detail) msg += ' (' + result.data.detail + ')';
        onError(msg);
      }
    })
    .catch(function () { if (onError) onError(); });
}

document.getElementById('loginButton').onclick = function () {
  var password = document.getElementById('passwordInput').value;
  fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: password })
  })
    .then(function (r) { return r.json(); })
    .then(function (data) {
      if (data.ok) {
        showApp();
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    });
};

document.getElementById('logoutButton').onclick = function () {
  fetch('/api/logout', { method: 'POST' }).then(function () { showLogin(); });
};

document.getElementById('saveButton').onclick = function () {
  if (!currentDoc || !currentSlug) return;
  var status = document.getElementById('saveStatus');
  status.textContent = 'Guardando...';
  var data = collectData(currentDoc);
  fetch('/api/content?page=' + currentSlug, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  })
    .then(function (r) { return r.json().then(function (body) { return { ok: r.ok, body: body }; }); })
    .then(function (result) {
      if (result.ok) {
        status.textContent = 'Guardado. Puede tardar unos segundos en verse reflejado.';
        if (result.body && result.body.debugWrite) {
          status.textContent += ' [debug: ' + JSON.stringify(result.body.debugWrite) + ']';
        }
        originalSnapshot = JSON.stringify(data);
      } else {
        var msg = (result.body && result.body.error) || 'Error al guardar.';
        if (result.body && result.body.detail) msg += ' (' + result.body.detail + ')';
        status.textContent = msg;
      }
    })
    .catch(function () { status.textContent = 'Error al guardar (sin respuesta del servidor).'; });
};

document.getElementById('discardButton').onclick = function () {
  if (!currentSlug) return;
  if (hasUnsavedChanges() && !confirm('¿Descartar los cambios sin guardar de esta página?')) return;
  loadPage(currentSlug, null);
};

window.addEventListener('beforeunload', function (e) {
  if (hasUnsavedChanges()) { e.preventDefault(); e.returnValue = ''; }
});

// Al cargar: comprobar si ya hay sesión activa
fetch('/api/session')
  .then(function (r) { return r.json(); })
  .then(function (data) {
    if (data.authenticated) showApp();
    else showLogin();
  });
</script>
