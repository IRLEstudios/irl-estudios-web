<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — IRL Estudios</title>
<meta name="robots" content="noindex, nofollow">
<style>
  :root{
    --ink:#232323;
    --paper:#eaeaea;
    --line-light:rgba(0,0,0,0.15);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:#111;
    color:var(--ink);
    font-family:ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, monospace;
    min-height:100vh;
  }
  .center-wrap{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .box{
    background:var(--paper);
    border:1.6px solid var(--line-light);
    border-radius:12.8px;
    padding:28px;
    width:100%;
    max-width:340px;
  }
  .box h1{font-size:18px; margin:0 0 16px;}
  input[type=password], input[type=text], textarea{
    width:100%;
    font-family:inherit;
    font-size:14px;
    padding:10px 12px;
    border:1.6px solid var(--line-light);
    border-radius:8px;
    background:#fff;
    color:var(--ink);
    margin-bottom:10px;
  }
  textarea{resize:vertical; min-height:70px;}
  button{
    font-family:inherit;
    font-size:13px;
    font-weight:700;
    background:var(--ink);
    color:var(--paper);
    border:none;
    border-radius:8px;
    padding:10px 18px;
    cursor:pointer;
  }
  button.secondary{
    background:transparent;
    color:var(--ink);
    border:1.6px solid rgba(0,0,0,0.6);
  }
  .error{color:#b3261e; font-size:13px; margin-bottom:10px; display:none;}
  .app{display:none;}
  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 24px;
    background:var(--paper);
    border-bottom:1px solid var(--line-light);
  }
  .layout{display:flex; min-height:calc(100vh - 57px);}
  .sidebar{
    width:260px;
    background:var(--paper);
    border-right:1px solid var(--line-light);
    padding:16px;
  }
  .sidebar button{
    display:block;
    width:100%;
    text-align:left;
    background:transparent;
    color:var(--ink);
    font-weight:400;
    border:none;
    border-radius:6px;
    padding:10px 12px;
    margin-bottom:4px;
  }
  .sidebar button:hover, .sidebar button.active{background:rgba(0,0,0,0.08);}
  .content{flex:1; padding:24px; background:#f5f5f0; overflow:auto;}
  .field{margin-bottom:18px;}
  .field label{
    display:block;
    font-size:12px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.03em;
    margin-bottom:6px;
    color:rgba(0,0,0,0.6);
  }
  .field img{
    max-width:220px;
    display:block;
    border-radius:6px;
    border:1px solid var(--line-light);
    margin-bottom:8px;
  }
  .save-bar{
    position:sticky;
    bottom:0;
    background:var(--paper);
    border-top:1px solid var(--line-light);
    padding:14px 24px;
    display:flex;
    align-items:center;
    gap:12px;
  }
  .status{font-size:13px; color:rgba(0,0,0,0.6);}
</style>
</head>
<body>

<div class="center-wrap" id="loginScreen">
  <div class="box">
    <h1>Entrar al panel</h1>
    <div class="error" id="loginError">Contraseña incorrecta.</div>
    <input type="password" id="passwordInput" placeholder="Contraseña" autofocus>
    <button id="loginButton" style="width:100%;">Entrar</button>
  </div>
</div>

<div class="app" id="app">
  <div class="topbar">
    <strong>IRL Estudios — Admin</strong>
    <button class="secondary" id="logoutButton">Cerrar sesión</button>
  </div>
  <div class="layout">
    <div class="sidebar" id="pageList"></div>
    <div class="content">
      <div id="editor"><p>Elige una página de la izquierda para empezar a editar.</p></div>
      <div class="save-bar" id="saveBar" style="display:none;">
        <button id="saveButton">Guardar cambios</button>
        <span class="status" id="saveStatus"></span>
      </div>
    </div>
  </div>
</div>

<script>
var PAGES = [
  { slug: 'home', label: 'Home' },
  { slug: 'produccion-musical-avanzada', label: 'Producción Musical Avanzada' },
  { slug: 'produccion-musical-iniciacion', label: 'Producción Musical Iniciación' },
  { slug: 'diseno-sonoro-audiovisual', label: 'Diseño Sonoro para audiovisual' },
  { slug: 'directo-en-ableton', label: 'Directo en Ableton' },
  { slug: 'opiniones', label: 'Opiniones de alumn@s' },
  { slug: 'turian-boy', label: 'turian boy' },
  { slug: 'estudio-a', label: 'Estudio A' }
];

var currentSlug = null;
var currentData = null;

function isImageKey(key) {
  return /image|photo|foto/i.test(key);
}
function isHtmlKey(key) {
  return /_html$/.test(key);
}

function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  renderPageList();
}

function showLogin() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

function renderPageList() {
  var list = document.getElementById('pageList');
  list.innerHTML = '';
  PAGES.forEach(function (p) {
    var btn = document.createElement('button');
    btn.textContent = p.label;
    btn.onclick = function () { loadPage(p.slug, btn); };
    list.appendChild(btn);
  });
}

function loadPage(slug, btnEl) {
  currentSlug = slug;
  document.querySelectorAll('.sidebar button').forEach(function (b) { b.classList.remove('active'); });
  if (btnEl) btnEl.classList.add('active');

  fetch('/api/content?page=' + slug)
    .then(function (r) { return r.json(); })
    .then(function (data) {
      currentData = data;
      renderEditor(data);
      document.getElementById('saveBar').style.display = 'flex';
    });
}

function renderEditor(data) {
  var editor = document.getElementById('editor');
  editor.innerHTML = '';

  Object.keys(data).forEach(function (key) {
    var field = document.createElement('div');
    field.className = 'field';

    var label = document.createElement('label');
    label.textContent = key.replace(/_/g, ' ');
    field.appendChild(label);

    if (isImageKey(key)) {
      var img = document.createElement('img');
      img.src = data[key];
      field.appendChild(img);

      var fileInput = document.createElement('input');
      fileInput.type = 'file';
      fileInput.accept = 'image/*';
      fileInput.onchange = function () {
        if (!fileInput.files[0]) return;
        uploadImage(fileInput.files[0], function (url) {
          currentData[key] = url;
          img.src = url;
        });
      };
      field.appendChild(fileInput);
    } else {
      var input = isHtmlKey(key) || String(data[key]).length > 80
        ? document.createElement('textarea')
        : document.createElement('input');
      if (input.tagName === 'INPUT') input.type = 'text';
      input.value = data[key];
      input.oninput = function () { currentData[key] = input.value; };
      field.appendChild(input);
    }

    editor.appendChild(field);
  });
}

function uploadImage(file, onDone) {
  var status = document.getElementById('saveStatus');
  status.textContent = 'Subiendo imagen...';
  fetch('/api/upload-image', {
    method: 'POST',
    headers: {
      'Content-Type': file.type,
      'X-Filename': file.name
    },
    body: file
  })
    .then(function (r) { return r.json(); })
    .then(function (data) {
      status.textContent = 'Imagen subida.';
      onDone(data.url);
    })
    .catch(function () { status.textContent = 'Error subiendo la imagen.'; });
}

document.getElementById('loginButton').onclick = function () {
  var password = document.getElementById('passwordInput').value;
  fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: password })
  })
    .then(function (r) { return r.json(); })
    .then(function (data) {
      if (data.ok) {
        showApp();
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    });
};

document.getElementById('logoutButton').onclick = function () {
  fetch('/api/logout', { method: 'POST' }).then(function () { showLogin(); });
};

document.getElementById('saveButton').onclick = function () {
  var status = document.getElementById('saveStatus');
  status.textContent = 'Guardando...';
  fetch('/api/content?page=' + currentSlug, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(currentData)
  })
    .then(function (r) { return r.json(); })
    .then(function () { status.textContent = 'Guardado. Puede tardar unos segundos en verse reflejado.'; })
    .catch(function () { status.textContent = 'Error al guardar.'; });
};

// Al cargar: comprobar si ya hay sesión activa
fetch('/api/session')
  .then(function (r) { return r.json(); })
  .then(function (data) {
    if (data.authenticated) showApp();
    else showLogin();
  });
</script>
</body>
</html>
